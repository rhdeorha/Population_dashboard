<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>강원도 인구 종합 대시보드 v1.4</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  background:#f5f7fa;color:#0f172a;font-size:13px;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;
  display:flex;flex-direction:column;}

/* ── 로딩 화면 ── */
.boot{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#1d4ed8 140%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;color:#e2e8f0;
}
.boot.hidden{display:none}
.boot-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:36px 40px;max-width:520px;width:100%;
  box-shadow:0 8px 40px rgba(0,0,0,.3);backdrop-filter:blur(8px);
}
.boot-brand{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.boot-brand .mark{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:22px;
  box-shadow:0 4px 16px rgba(37,99,235,.5);
  animation:bootPulse 2s ease-in-out infinite;
}
@keyframes bootPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.boot-title{font-size:20px;font-weight:800;color:#f1f5f9;letter-spacing:-0.02em}
.boot-sub{font-size:11.5px;color:#94a3b8;margin-top:2px;letter-spacing:.3px}
.boot-msg{
  font-size:13px;color:#cbd5e1;margin:20px 0 18px;line-height:1.6;
  padding:14px 16px;background:rgba(37,99,235,.12);
  border:1px solid rgba(96,165,250,.25);border-radius:10px;
}
.boot-list{display:flex;flex-direction:column;gap:10px}
.boot-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);border-radius:10px;
  transition:all .25s;
}
.boot-row.ready{border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.06)}
.boot-row.error{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.08)}
.boot-row .b-mark{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:14px;flex-shrink:0;
}
.boot-row[data-key="pop"] .b-mark{background:linear-gradient(135deg,#2563eb,#60a5fa)}
.boot-row[data-key="nat"] .b-mark{background:linear-gradient(135deg,#ec4899,#fb7185)}
.boot-row[data-key="mig"] .b-mark{background:linear-gradient(135deg,#0d9488,#34d399)}
.b-info{flex:1;min-width:0}
.b-name{font-size:13px;font-weight:700;color:#f1f5f9}
.b-status{font-size:10.5px;color:#94a3b8;margin-top:2px;font-variant-numeric:tabular-nums;letter-spacing:.2px}
.b-bar{
  height:4px;background:rgba(255,255,255,.08);border-radius:2px;
  margin-top:6px;overflow:hidden;
}
.b-bar > div{
  height:100%;width:0%;background:linear-gradient(90deg,#60a5fa,#a78bfa);
  border-radius:2px;transition:width .2s ease;
}
.boot-row.ready .b-bar > div{background:linear-gradient(90deg,#4ade80,#86efac)}
.boot-row.error .b-bar > div{background:linear-gradient(90deg,#f87171,#fca5a5)}
.b-indicator{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#cbd5e1;
}
.boot-row.pending .b-indicator::before{content:"";width:10px;height:10px;border:2px solid #94a3b8;border-top-color:#60a5fa;border-radius:50%;animation:spin 1s linear infinite}
.boot-row.ready  .b-indicator{color:#4ade80}
.boot-row.ready  .b-indicator::before{content:"✓";font-weight:800}
.boot-row.error  .b-indicator{color:#f87171}
.boot-row.error  .b-indicator::before{content:"!";font-weight:800}
@keyframes spin{to{transform:rotate(360deg)}}

.boot-total{
  margin-top:18px;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;justify-content:space-between;align-items:center;
  font-size:11.5px;color:#94a3b8;
}
.boot-total b{color:#e2e8f0;font-weight:700;font-variant-numeric:tabular-nums}

.boot-foot{
  text-align:center;font-size:10.5px;color:#64748b;margin-top:20px;
  letter-spacing:.3px;line-height:1.5;
}

/* ── 메인 UI (로딩 후) ──
   v1.4 fix: 항상 display:flex 상태로 두고 .boot가 z-index로 덮음.
   이렇게 해야 iframe들이 부팅 중에도 정확한 크기를 가져
   Leaflet 지도와 Plotly 차트가 올바르게 초기화됨. */
.main-ui{display:flex;flex-direction:column;flex:1;height:100%}

.tabbar{display:flex;align-items:stretch;background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);
  color:#e2e8f0;border-bottom:2px solid #1d4ed8;flex-shrink:0;box-shadow:0 2px 8px rgba(15,23,42,.18);}
.tabbar .brand{padding:14px 22px;display:flex;align-items:center;gap:10px;border-right:1px solid #1f2a44;}
.tabbar .brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#2563eb,#60a5fa);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;
  box-shadow:0 2px 8px rgba(37,99,235,.4);transition:background .2s}
.tabbar .brand .t1{font-size:15px;font-weight:800;color:#f1f5f9;letter-spacing:-0.02em}
.tabbar .brand .t2{font-size:11px;color:#94a3b8;margin-top:1px;letter-spacing:.3px}
.tabbar .tabs{display:flex;align-items:stretch;flex:1;}
.tabbar .tab{background:transparent;border:none;color:#94a3b8;cursor:pointer;
  padding:0 28px;font-size:14px;font-weight:600;font-family:inherit;
  display:flex;align-items:center;gap:8px;border-bottom:3px solid transparent;
  transition:all .15s;letter-spacing:-0.01em;}
.tabbar .tab:hover{color:#cbd5e1;background:rgba(255,255,255,.04)}
.tabbar .tab.active{color:#fff;border-bottom-color:#60a5fa;background:rgba(37,99,235,.12)}
.tabbar .tab .num{display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.1);
  font-size:11px;font-weight:800;color:#cbd5e1;}
.tabbar .tab.active .num{background:#2563eb;color:#fff}
.tabbar .meta{margin-left:auto;padding:0 22px;display:flex;align-items:center;gap:14px;font-size:11px;color:#94a3b8;}
.tabbar .meta .badge{display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:6px;background:rgba(37,99,235,.15);
  border:1px solid rgba(37,99,235,.3);color:#93c5fd;font-weight:600;}

.frame-wrap{flex:1;position:relative;overflow:hidden;background:#f5f7fa;}
/* v1.4 fix: iframe은 항상 렌더링되어야 Leaflet/Plotly가 정확한 크기를 측정. 시각만 토글 */
.dash-frame{position:absolute;inset:0;width:100%;height:100%;border:none;background:#f5f7fa;
  visibility:hidden;pointer-events:none;z-index:0;}
.dash-frame.active{visibility:visible;pointer-events:auto;z-index:1;}

.err-banner{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:#fee2e2;border:1px solid #fecaca;color:#b91c1c;
  padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;
  box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:1001;
}
</style>
</head>
<body>

<!-- ════════════════════ 로딩 화면 ════════════════════ -->
<div class="boot" id="boot">
  <div class="boot-card">
    <div class="boot-brand">
      <div class="mark" id="bootMark">江</div>
      <div>
        <div class="boot-title">강원도 인구 종합 대시보드</div>
        <div class="boot-sub">v1.4 · 2026.05 · 일괄 사전 로딩</div>
      </div>
    </div>
    <div class="boot-msg" id="bootMsg">
      대시보드 3개를 동시에 준비하고 있어요. 완료되면 탭 전환은 즉시 이루어집니다.
    </div>

    <div class="boot-list" id="bootList">
      <!-- JS로 채워짐 -->
    </div>

    <div class="boot-total">
      <span><b id="bootDoneCount">0</b> / 3 완료</span>
      <span><b id="bootBytes">0.0</b> MB 다운로드</span>
    </div>

    <div class="boot-foot">
      처음 로드는 다소 시간이 걸릴 수 있습니다 (인구이동 데이터 ~21 MB).<br>
      모든 자료는 한 번만 받아 메모리에 보관되며, 탭 전환은 즉시 이루어집니다.
    </div>
  </div>
</div>

<!-- ════════════════════ 메인 UI ════════════════════ -->
<div class="main-ui" id="mainUI">
  <div class="tabbar">
    <div class="brand">
      <div class="mark" id="brandMark">江</div>
      <div>
        <div class="t1">강원도 인구 종합 대시보드</div>
        <div class="t2">총인구 · 자연증감 · 인구이동</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="pop"><span class="num">1</span>총인구</button>
      <button class="tab" data-tab="nat"><span class="num">2</span>자연증감</button>
      <button class="tab" data-tab="mig"><span class="num">3</span>인구이동</button>
    </div>
    <div class="meta"><span class="badge">v1.4 · 2026.05 · 일괄 사전 로딩</span></div>
  </div>

  <div class="frame-wrap" id="frameWrap">
    <iframe class="dash-frame" id="frame-pop"></iframe>
    <iframe class="dash-frame" id="frame-nat"></iframe>
    <iframe class="dash-frame" id="frame-mig"></iframe>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// 설정 — 알맹이 대시보드 3개의 파일명
// 버전 업데이트 시 이 블록의 file 값만 수정하고 push 하면 됩니다.
// ══════════════════════════════════════════════════════════════════
const DASHBOARDS = {
  pop: {
    file: '20260507_강원_총인구_대시보드_v1_8.html',
    name: '총인구 대시보드',
    desc: '월별 인구 · 5세별 · 소멸지수',
    mark: '人'
  },
  nat: {
    file: '20260507_강원_자연증감_대시보드_v1_1.html',
    name: '자연증감 대시보드',
    desc: '출생·사망·혼인·이혼',
    mark: '生'
  },
  mig: {
    file: '20260507_강원도_인구이동_종합대시보드_v7.13.html',
    name: '인구이동 종합 대시보드',
    desc: 'MDIS · 21 MB · DuckDB-WASM',
    mark: '移'
  }
};
const HANJA = {pop:'人', nat:'生', mig:'移'};

// ══════════════════════════════════════════════════════════════════
// iframe 안의 개별 대시보드 헤더 숨김 CSS (v1.3에서 가져옴)
// ══════════════════════════════════════════════════════════════════
const IFRAME_HIDE_COMMON = `
  .sb-brand { display:none !important; }
  .header { display:none !important; }
  .main { padding-top: 12px !important; }
`;
const IFRAME_HIDE_MIG = `
  .sb-brand { display:flex !important; padding:0 !important; border-bottom:none !important; }
  .sb-brand .mark { display:none !important; }
  .sb-brand > div:nth-child(2) { display:none !important; }
  .sb-brand .sb-collapse { display:flex !important; margin-left:auto; }
  .header { display:block !important; }
  .header > .header-top { display:none !important; }
  .header > .toolbar { display:flex !important; }
  .main { padding-top: 8px !important; }
`;

function injectIframeStyle(iframe, tab){
  try {
    const doc = iframe.contentDocument;
    if(!doc || !doc.head) return;
    let st = doc.getElementById('__shellHideStyle');
    if(!st){
      st = doc.createElement('style');
      st.id = '__shellHideStyle';
      doc.head.appendChild(st);
    }
    st.textContent = (tab === 'mig') ? IFRAME_HIDE_MIG : IFRAME_HIDE_COMMON;
  } catch(e){
    console.warn('[v1.4] iframe style 주입 실패 ['+tab+']:', e);
  }
}

// ══════════════════════════════════════════════════════════════════
// 로딩 화면 헬퍼
// ══════════════════════════════════════════════════════════════════
const state = {
  rows: {},           // key → {row, bar, status, bytes}
  bytesTotal: 0,
  doneCount: 0,
  blobUrls: {},       // 정리용
  errors: []
};

function buildBootList(){
  const list = document.getElementById('bootList');
  for(const [key, cfg] of Object.entries(DASHBOARDS)){
    const row = document.createElement('div');
    row.className = 'boot-row pending';
    row.dataset.key = key;
    row.innerHTML = `
      <div class="b-mark">${cfg.mark}</div>
      <div class="b-info">
        <div class="b-name">${cfg.name}</div>
        <div class="b-status">대기 중...</div>
        <div class="b-bar"><div></div></div>
      </div>
      <div class="b-indicator"></div>
    `;
    list.appendChild(row);
    state.rows[key] = {
      row,
      bar: row.querySelector('.b-bar > div'),
      status: row.querySelector('.b-status'),
      bytes: 0
    };
  }
}

function setStatus(key, text){
  const r = state.rows[key];
  if(r) r.status.textContent = text;
}

function setProgress(key, pct){
  const r = state.rows[key];
  if(r) r.bar.style.width = Math.max(0, Math.min(100, pct)) + '%';
}

function setReady(key){
  const r = state.rows[key];
  if(r){
    r.row.classList.remove('pending');
    r.row.classList.add('ready');
    r.bar.style.width = '100%';
    state.doneCount++;
    document.getElementById('bootDoneCount').textContent = state.doneCount;
  }
}

function setError(key, msg){
  const r = state.rows[key];
  if(r){
    r.row.classList.remove('pending');
    r.row.classList.add('error');
    r.status.textContent = '실패: ' + msg;
  }
  state.errors.push({key, msg});
}

function addBytes(delta){
  state.bytesTotal += delta;
  document.getElementById('bootBytes').textContent = (state.bytesTotal / 1048576).toFixed(1);
}

// ══════════════════════════════════════════════════════════════════
// 페치 + 진행률 추적
// ══════════════════════════════════════════════════════════════════
async function fetchWithProgress(key, url){
  setStatus(key, '연결 중...');
  const resp = await fetch(url);
  if(!resp.ok) throw new Error('HTTP ' + resp.status);
  const total = Number(resp.headers.get('content-length')) || 0;
  const reader = resp.body.getReader();
  const chunks = [];
  let received = 0;
  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    chunks.push(value);
    received += value.length;
    addBytes(value.length);
    state.rows[key].bytes = received;
    if(total){
      setProgress(key, (received/total)*60);  // HTML 다운로드 = 60% 까지
      setStatus(key, (received/1024).toFixed(0) + ' / ' + (total/1024).toFixed(0) + ' KB');
    } else {
      setStatus(key, (received/1024).toFixed(0) + ' KB');
    }
  }
  // 단일 Uint8Array 구성
  const buf = new Uint8Array(received);
  let off = 0;
  for(const c of chunks){ buf.set(c, off); off += c.length; }
  return buf;
}

// v1.4: mig iframe이 보내는 postMessage 대기용 (KPI 계산까지 완료 시점)
const migReady = {resolved: false, resolve: null};
const migReadyPromise = new Promise(res => { migReady.resolve = res; });
window.addEventListener('message', (e) => {
  if(e.data && e.data.type === 'mig-ready' && !migReady.resolved){
    migReady.resolved = true;
    migReady.resolve();
  }
});

// iframe 로드 (Blob URL 사용)
function loadIframeWithBlob(key, buf){
  return new Promise((resolve, reject) => {
    setStatus(key, '대시보드 초기화...');
    setProgress(key, 65);
    const blob = new Blob([buf], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    state.blobUrls[key] = url;
    const iframe = document.getElementById('frame-' + key);

    let htmlLoadTimeout = setTimeout(() => {
      console.warn('[v1.4] '+key+' iframe onload 50초 초과 — 강제 진행');
      htmlLoaded();
    }, 50000);

    // 일반 대시보드(pop, nat): onload면 끝
    // mig: onload는 단지 HTML 파싱 끝 — DuckDB+parquet+KPI 계산은 그 후 별도로 진행됨
    //      → postMessage 'mig-ready' 까지 기다림
    async function htmlLoaded(){
      clearTimeout(htmlLoadTimeout);
      try { injectIframeStyle(iframe, key); } catch(e) {}

      if(key !== 'mig'){
        setProgress(key, 100);
        setStatus(key, '완료');
        setReady(key);
        resolve();
        return;
      }

      // mig 전용: DuckDB+parquet+KPI 계산 대기
      setProgress(key, 80);
      setStatus(key, 'DuckDB + 21MB parquet 준비 중...');

      // 90초 안에 mig-ready 안 오면 진행 (네트워크 매우 느린 경우 안전망)
      const migTimeoutId = setTimeout(() => {
        if(!migReady.resolved){
          console.warn('[v1.4] mig-ready postMessage 90초 초과 — 강제 진행');
          migReady.resolved = true;
          migReady.resolve();
        }
      }, 90000);

      await migReadyPromise;
      clearTimeout(migTimeoutId);
      setProgress(key, 100);
      setStatus(key, '완료 (KPI 계산 포함)');
      setReady(key);
      resolve();
    }

    iframe.onload = htmlLoaded;
    iframe.onerror = (e) => {
      clearTimeout(htmlLoadTimeout);
      reject(new Error('iframe 로드 실패'));
    };
    iframe.src = url;
  });
}

// ══════════════════════════════════════════════════════════════════
// 메인 부트 시퀀스
// ══════════════════════════════════════════════════════════════════
async function boot(){
  buildBootList();
  const t0 = performance.now();

  const tasks = Object.entries(DASHBOARDS).map(async ([key, cfg]) => {
    try {
      const buf = await fetchWithProgress(key, cfg.file);
      await loadIframeWithBlob(key, buf);
    } catch(e){
      console.error('['+key+'] 로드 실패:', e);
      setError(key, e.message);
    }
  });

  await Promise.all(tasks);
  const dt = ((performance.now() - t0)/1000).toFixed(1);
  console.log('[v1.4] 부트 완료: '+dt+'초, '+state.errors.length+' 에러');

  if(state.errors.length === 3){
    // 모두 실패 — 에러 메시지 표시
    document.getElementById('bootMsg').innerHTML =
      '<span style="color:#fca5a5;font-weight:700">모든 대시보드 로드 실패</span><br>인터넷 연결 또는 GitHub Pages 활성 상태를 확인해 주세요.';
    return;
  }

  // 잠시 완료 화면 보여주고 메인 UI로 전환
  document.getElementById('bootMsg').textContent =
    '준비 완료! 잠시 후 대시보드가 나타납니다.';
  await new Promise(r => setTimeout(r, 500));

  document.getElementById('boot').classList.add('hidden');
  document.getElementById('mainUI').classList.add('visible');
  activateTab('pop');

  if(state.errors.length > 0){
    // 일부 실패 — 경고 배너
    const errKeys = state.errors.map(e => DASHBOARDS[e.key].name).join(', ');
    const banner = document.createElement('div');
    banner.className = 'err-banner';
    banner.textContent = '⚠ 일부 대시보드 로드 실패: ' + errKeys;
    document.body.appendChild(banner);
    setTimeout(() => banner.remove(), 5000);
  }
}

// ══════════════════════════════════════════════════════════════════
// 탭 전환 (CSS display 토글만 — 즉시)
// ══════════════════════════════════════════════════════════════════
function applyHanja(tab){
  const el = document.getElementById('brandMark');
  if(el && HANJA[tab]) el.textContent = HANJA[tab];
}

function activateTab(tab){
  // 모든 iframe에서 active 클래스 해제
  document.querySelectorAll('.dash-frame').forEach(f => f.classList.remove('active'));
  // 선택 iframe만 표시
  const target = document.getElementById('frame-' + tab);
  if(target) target.classList.add('active');
  // 탭 버튼 활성 상태
  document.querySelectorAll('.tabbar .tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  applyHanja(tab);
}

document.querySelectorAll('.tabbar .tab').forEach(b => {
  b.addEventListener('click', () => activateTab(b.dataset.tab));
});

// 페이지 종료 시 Blob URL 정리 (메모리 누수 방지)
window.addEventListener('beforeunload', () => {
  for(const url of Object.values(state.blobUrls)){
    try { URL.revokeObjectURL(url); } catch(_) {}
  }
});

// 시작
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
